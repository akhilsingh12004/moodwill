services:
  - type: web
    name: moodwill-backend
    env: node
    region: singapore          # closest to India
    plan: free

    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false            # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false            # set to your Vercel frontend URL
